<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>
</head>
<body>

    <h2>Spam Detection App</h2>

    <form method="POST">
        <textarea name="message" rows="5" cols="40"></textarea>
        <br><br>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ result }}</h3>
    <p>Spam: {{ prob_spam }}</p>
    <p>Ham: {{ prob_ham }}</p>

</body>
</html>
